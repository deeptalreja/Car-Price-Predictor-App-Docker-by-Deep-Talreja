<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Car Price Predictor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --asphalt: #14171c;
    --panel: #1b2029;
    --panel-raised: #222833;
    --steel: #2c3340;
    --steel-line: #3a4350;
    --chrome: #c9ced6;
    --chrome-dim: #7d8794;
    --amber: #ffb300;
    --amber-glow: rgba(255, 179, 0, 0.35);
    --taillight: #e63946;
    --taillight-dim: #7a1f27;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100vh;
    background: var(--asphalt);
    color: var(--chrome);
    font-family: 'Inter', sans-serif;
  }

  body {
    background-image:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(255,179,0,0.08), transparent 60%),
      repeating-linear-gradient(180deg, transparent, transparent 78px, rgba(255,255,255,0.015) 78px, rgba(255,255,255,0.015) 80px);
    padding: 48px 20px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    color: var(--amber);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .eyebrow::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 8px 2px var(--amber-glow);
  }

  h1 {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: clamp(2rem, 5vw, 2.8rem);
    letter-spacing: 0.01em;
    margin: 0 0 6px;
    color: #f2f4f7;
    text-transform: uppercase;
  }

  p.subtitle {
    color: var(--chrome-dim);
    font-size: 0.95rem;
    margin: 0 0 34px;
    text-align: center;
    max-width: 420px;
  }

  .dashboard {
    width: 100%;
    max-width: 880px;
    background: linear-gradient(180deg, var(--panel-raised), var(--panel));
    border: 1px solid var(--steel-line);
    border-radius: 20px;
    box-shadow:
      0 30px 60px -20px rgba(0,0,0,0.6),
      inset 0 1px 0 rgba(255,255,255,0.03);
    display: grid;
    grid-template-columns: 1.15fr 1fr;
    overflow: hidden;
  }

  @media (max-width: 760px) {
    .dashboard { grid-template-columns: 1fr; }
  }

  /* --- LEFT: CONTROL PANEL --- */
  .controls {
    padding: 34px 32px;
    border-right: 1px solid var(--steel-line);
  }
  @media (max-width: 760px) {
    .controls { border-right: none; border-bottom: 1px solid var(--steel-line); }
  }

  .panel-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    color: var(--chrome-dim);
    text-transform: uppercase;
    margin-bottom: 18px;
    padding-bottom: 10px;
    border-bottom: 1px dashed var(--steel-line);
  }

  .form-group { margin-bottom: 16px; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  label {
    display: block;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--chrome-dim);
    margin-bottom: 7px;
  }

  input, select {
    width: 100%;
    background: var(--steel);
    border: 1px solid var(--steel-line);
    color: var(--chrome);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.92rem;
    padding: 11px 12px;
    border-radius: 8px;
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  select {
    background-image: linear-gradient(45deg, transparent 50%, var(--chrome-dim) 50%), linear-gradient(135deg, var(--chrome-dim) 50%, transparent 50%);
    background-position: calc(100% - 18px) center, calc(100% - 13px) center;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    cursor: pointer;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--amber);
    box-shadow: 0 0 0 3px var(--amber-glow);
  }
  input::placeholder { color: #565f6c; }

  .ignition-btn {
    width: 100%;
    margin-top: 6px;
    background: linear-gradient(180deg, #ff5a67, var(--taillight));
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 1.05rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 8px 20px -6px rgba(230, 57, 70, 0.55);
    transition: transform 0.1s ease, box-shadow 0.15s ease;
  }
  .ignition-btn:hover {
    box-shadow: 0 10px 24px -6px rgba(230, 57, 70, 0.7);
    transform: translateY(-1px);
  }
  .ignition-btn:active { transform: translateY(0); }

  /* --- RIGHT: GAUGE PANEL --- */
  .gauge-panel {
    padding: 34px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center 30%, rgba(255,179,0,0.05), transparent 65%);
  }

  .gauge-wrap { position: relative; width: 260px; }

  #needle {
    transform-origin: 130px 130px;
    transition: transform 1.1s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .readout {
    text-align: center;
    margin-top: 6px;
  }
  .readout .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--chrome-dim);
    margin-bottom: 6px;
  }
  .readout .digits {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 2.1rem;
    color: var(--amber);
    text-shadow: 0 0 18px var(--amber-glow);
    letter-spacing: 0.02em;
    min-height: 2.6rem;
  }
  .readout .digits.placeholder {
    color: #4a525f;
    text-shadow: none;
    font-size: 1rem;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .error-box {
    margin-top: 14px;
    color: var(--taillight);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    text-align: center;
    display: none;
  }
  .error-box.visible { display: block; }

  .footer-note {
    margin-top: 26px;
    color: var(--chrome-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.05em;
    text-align: center;
  }
  .footer-note strong { color: var(--chrome); }
</style>
</head>
<body>

  <div class="eyebrow">MP Online &middot; AI/ML Internship</div>
  <h1>Car Price Predictor</h1>
  <p class="subtitle">Enter the vehicle's specs and the model will estimate its resale value — like reading it straight off the dash.</p>

  <div class="dashboard">
    <div class="controls">
      <div class="panel-label">Vehicle Specifications</div>

      <form id="predict-form">
        <div class="form-group">
          <label>Present Price (Lakhs)</label>
          <input type="number" step="0.1" id="present_price" placeholder="e.g. 8.5" required />
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Kms Driven</label>
            <input type="number" id="kms_driven" placeholder="45000" required />
          </div>
          <div class="form-group">
            <label>Car Age (yrs)</label>
            <input type="number" id="car_age" placeholder="4" required />
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Fuel Type</label>
            <select id="fuel_type">
              <option value="Petrol">Petrol</option>
              <option value="Diesel">Diesel</option>
              <option value="CNG">CNG</option>
            </select>
          </div>
          <div class="form-group">
            <label>Transmission</label>
            <select id="transmission">
              <option value="Manual">Manual</option>
              <option value="Automatic">Automatic</option>
            </select>
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <label>Seller Type</label>
            <select id="seller_type">
              <option value="Dealer">Dealer</option>
              <option value="Individual">Individual</option>
            </select>
          </div>
          <div class="form-group">
            <label>Prev. Owners</label>
            <input type="number" id="owner" value="0" min="0" max="3" required />
          </div>
        </div>

        <button type="submit" class="ignition-btn">▶ Predict Price</button>
      </form>
    </div>

    <div class="gauge-panel">
      <div class="gauge-wrap">
        <svg viewBox="0 0 260 160" width="260" height="160">
          <!-- Tick marks -->
          <g stroke="#3a4350" stroke-width="2">
            <line x1="20" y1="130" x2="34" y2="130" />
            <line x1="30" y1="70" x2="43" y2="75" />
            <line x1="70" y1="30" x2="75" y2="43" />
            <line x1="130" y1="18" x2="130" y2="32" />
            <line x1="190" y1="30" x2="185" y2="43" />
            <line x1="230" y1="70" x2="217" y2="75" />
            <line x1="240" y1="130" x2="226" y2="130" />
          </g>
          <!-- Arc -->
          <path d="M 20 130 A 110 110 0 0 1 240 130" fill="none" stroke="#2c3340" stroke-width="10" stroke-linecap="round"/>
          <path id="arc-fill" d="M 20 130 A 110 110 0 0 1 240 130" fill="none" stroke="#ffb300" stroke-width="10" stroke-linecap="round"
                stroke-dasharray="345.6" stroke-dashoffset="345.6" opacity="0.85"/>
          <!-- Needle -->
          <g id="needle">
            <line x1="130" y1="130" x2="130" y2="38" stroke="#e63946" stroke-width="3" stroke-linecap="round"/>
            <circle cx="130" cy="130" r="8" fill="#e63946" stroke="#0f1216" stroke-width="2"/>
          </g>
        </svg>
      </div>
      <div class="readout">
        <div class="tag">Estimated Selling Price</div>
        <div id="result-value" class="digits placeholder">— awaiting input —</div>
      </div>
      <div id="error" class="error-box"></div>
    </div>
  </div>

  <p class="footer-note">Built by <strong>Deep Talreja</strong> &middot; MP Online AI/ML Internship</p>

  <script>
    const form = document.getElementById('predict-form');
    const resultValue = document.getElementById('result-value');
    const errorBox = document.getElementById('error');
    const needle = document.getElementById('needle');
    const arcFill = document.getElementById('arc-fill');

    const GAUGE_MAX = 25; // Lakhs — needle maxes out around this range
    const ARC_LENGTH = 345.6;

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('visible');

      const payload = {
        present_price: document.getElementById('present_price').value,
        kms_driven: document.getElementById('kms_driven').value,
        fuel_type: document.getElementById('fuel_type').value,
        seller_type: document.getElementById('seller_type').value,
        transmission: document.getElementById('transmission').value,
        owner: document.getElementById('owner').value,
        car_age: document.getElementById('car_age').value,
      };

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || 'Something went wrong';
          errorBox.classList.add('visible');
          needle.style.transform = 'rotate(0deg)';
          arcFill.style.strokeDashoffset = ARC_LENGTH;
          resultValue.textContent = '— awaiting input —';
          resultValue.classList.add('placeholder');
          return;
        }

        const price = data.predicted_price_lakhs;
        const clamped = Math.min(price, GAUGE_MAX);
        const angle = (clamped / GAUGE_MAX) * 180 - 90;
        const offset = ARC_LENGTH - (clamped / GAUGE_MAX) * ARC_LENGTH;

        needle.style.transform = `rotate(${angle}deg)`;
        arcFill.style.strokeDashoffset = offset;

        resultValue.classList.remove('placeholder');
        resultValue.textContent = `₹ ${price} L`;
      } catch (err) {
        errorBox.textContent = 'Failed to reach the server';
        errorBox.classList.add('visible');
      }
    });
  </script>
</body>
</html>
