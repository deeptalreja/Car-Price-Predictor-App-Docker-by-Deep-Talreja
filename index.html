<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car Price Predictor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <div class="card">
    <h1>🚗 Car Price Predictor</h1>
    <p class="subtitle">Estimate a used car's resale value</p>

    <form id="predict-form">
      <div class="form-group">
        <label>Present Price (Lakhs)</label>
        <input type="number" step="0.1" id="present_price" required />
      </div>

      <div class="two-col">
        <div class="form-group">
          <label>Kms Driven</label>
          <input type="number" id="kms_driven" required />
        </div>
        <div class="form-group">
          <label>Car Age (years)</label>
          <input type="number" id="car_age" required />
        </div>
      </div>

      <div class="two-col">
        <div class="form-group">
          <label>Fuel Type</label>
          <select id="fuel_type">
            <option value="Petrol">Petrol</option>
            <option value="Diesel">Diesel</option>
            <option value="CNG">CNG</option>
          </select>
        </div>
        <div class="form-group">
          <label>Transmission</label>
          <select id="transmission">
            <option value="Manual">Manual</option>
            <option value="Automatic">Automatic</option>
          </select>
        </div>
      </div>

      <div class="two-col">
        <div class="form-group">
          <label>Seller Type</label>
          <select id="seller_type">
            <option value="Dealer">Dealer</option>
            <option value="Individual">Individual</option>
          </select>
        </div>
        <div class="form-group">
          <label>Previous Owners</label>
          <input type="number" id="owner" value="0" min="0" max="3" required />
        </div>
      </div>

      <button type="submit" class="predict-btn">Predict Price</button>
    </form>

    <div id="result" class="result-box">
      <div class="label">Estimated Selling Price</div>
      <div id="result-value" class="value"></div>
    </div>

    <div id="error" class="error-box"></div>

    <p class="footer-note">Built by Deep Talreja &middot; MP Online AI/ML Internship</p>
  </div>

  <script>
    const form = document.getElementById('predict-form');
    const resultBox = document.getElementById('result');
    const resultValue = document.getElementById('result-value');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      resultBox.classList.remove('visible');
      errorBox.classList.remove('visible');

      const payload = {
        present_price: document.getElementById('present_price').value,
        kms_driven: document.getElementById('kms_driven').value,
        fuel_type: document.getElementById('fuel_type').value,
        seller_type: document.getElementById('seller_type').value,
        transmission: document.getElementById('transmission').value,
        owner: document.getElementById('owner').value,
        car_age: document.getElementById('car_age').value,
      };

      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok) {
          errorBox.textContent = data.error || 'Something went wrong';
          errorBox.classList.add('visible');
          return;
        }

        resultValue.textContent = `₹ ${data.predicted_price_lakhs} Lakhs`;
        resultBox.classList.add('visible');
      } catch (err) {
        errorBox.textContent = 'Failed to reach the server';
        errorBox.classList.add('visible');
      }
    });
  </script>
</body>
</html>
